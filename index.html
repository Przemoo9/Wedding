<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ślub i Wesele / Wedding — Przemysław & Monika</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ===== LANGUAGE TOGGLE ===== -->
  <header class="lang-toggle">
    <button class="lang-btn active" data-lang="pl" aria-pressed="true">PL</button>
    <span class="lang-divider">|</span>
    <button class="lang-btn" data-lang="en" aria-pressed="false">EN</button>
  </header>

  <!-- ===== HERO SECTION ===== -->
  <section class="hero" id="hero">
    <div class="hero-image">
      <div class="hero-placeholder">
        <div class="flower-decoration flower-deco-1">
          <svg viewBox="0 0 100 100" class="flower-svg">
            <line x1="50" y1="100" x2="50" y2="50" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
            <ellipse cx="50" cy="20" rx="10" ry="14" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>
            <ellipse cx="50" cy="20" rx="14" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>
            <ellipse cx="42" cy="14" rx="8" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5" transform="rotate(-30 42 14)"/>
            <ellipse cx="58" cy="14" rx="8" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5" transform="rotate(30 58 14)"/>
            <ellipse cx="58" cy="26" rx="8" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5" transform="rotate(60 58 26)"/>
            <ellipse cx="42" cy="26" rx="8" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5" transform="rotate(-60 42 26)"/>
            <circle cx="50" cy="20" r="5" fill="#D84315"/>
          </svg>
        </div>
        <div class="flower-decoration flower-deco-2">
          <svg viewBox="0 0 80 80" class="flower-svg">
            <line x1="40" y1="80" x2="40" y2="40" stroke="#4CAF50" stroke-width="2" stroke-linecap="round"/>
            <ellipse cx="40" cy="16" rx="7" ry="11" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>
            <ellipse cx="40" cy="16" rx="11" ry="7" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>
            <ellipse cx="34" cy="11" rx="6" ry="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5" transform="rotate(-30 34 11)"/>
            <ellipse cx="46" cy="11" rx="6" ry="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5" transform="rotate(30 46 11)"/>
            <ellipse cx="46" cy="21" rx="6" ry="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5" transform="rotate(60 46 21)"/>
            <ellipse cx="34" cy="21" rx="6" ry="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5" transform="rotate(-60 34 21)"/>
            <circle cx="40" cy="16" r="4" fill="#D84315"/>
          </svg>
        </div>
        <div class="flower-decoration flower-deco-3">
          <svg viewBox="0 0 60 60" class="flower-svg">
            <line x1="30" y1="60" x2="30" y2="30" stroke="#4CAF50" stroke-width="1.8" stroke-linecap="round"/>
            <ellipse cx="30" cy="12" rx="5" ry="8" fill="#FFF8E1" stroke="#E0E0E0" stroke-width="0.5"/>
            <ellipse cx="30" cy="12" rx="8" ry="5" fill="#FFF8E1" stroke="#E0E0E0" stroke-width="0.5"/>
            <ellipse cx="25" cy="8" rx="5" ry="7" fill="#FFF8E1" stroke="#E0E0E0" stroke-width="0.5" transform="rotate(-30 25 8)"/>
            <ellipse cx="35" cy="8" rx="5" ry="7" fill="#FFF8E1" stroke="#E0E0E0" stroke-width="0.5" transform="rotate(30 35 8)"/>
            <ellipse cx="35" cy="16" rx="5" ry="7" fill="#FFF8E1" stroke="#E0E0E0" stroke-width="0.5" transform="rotate(60 35 16)"/>
            <ellipse cx="25" cy="16" rx="5" ry="7" fill="#FFF8E1" stroke="#E0E0E0" stroke-width="0.5" transform="rotate(-60 25 16)"/>
            <circle cx="30" cy="12" r="3" fill="#D84315"/>
          </svg>
        </div>
        <span class="placeholder-icon">&#10084;</span>
      </div>
    </div>
    <div class="hero-content">
      <h1 class="hero-title">
        <span data-pl="" data-en="THE WEDDING OF" class="lang-part line1"></span>
        <span data-pl="" data-en="Przemysław & Monika" class="lang-part line2 names-line"></span>
        <span class="lang-alt">
          <span data-pl="ŚLUB I WESELE" data-en="" class="lang-part line3"></span>
          <span data-pl="Przemysław & Monika" data-en="Przemysław & Monika" class="lang-part line4 names-line"></span>
        </span>
      </h1>
      <div class="hero-footer">
        <span class="hero-date">09 . 12 . 26</span>
        <span class="hero-location">KRAKÓW, POLAND</span>
      </div>
    </div>
  </section>

  <!-- ===== TIMELINE SECTION ===== -->
  <section class="timeline" id="timeline">
    <div class="container">
      <div class="timeline-item">
        <div class="timeline-time">15:00</div>
        <div class="timeline-divider"></div>
        <div class="timeline-text">
          <span data-pl="Ceremonia Ślubna" data-en="The Ceremony" class="lang-part"></span>
        </div>
      </div>
      <div class="timeline-item">
        <div class="timeline-time">17:30</div>
        <div class="timeline-divider"></div>
        <div class="timeline-text">
          <span data-pl="Obiad i Przyjęcie" data-en="Cocktails & Dinner" class="lang-part"></span>
        </div>
      </div>
      <div class="timeline-item">
        <div class="timeline-time">21:00</div>
        <div class="timeline-divider"></div>
        <div class="timeline-text">
          <span data-pl="Zabawa Weselna" data-en="Dancing" class="lang-part"></span>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== VENUES SECTION ===== -->
  <section class="venues" id="venues">
    <div class="container">
      <h2 class="section-title">
        <span data-pl="Miejsca" data-en="Venues" class="lang-part"></span>
      </h2>
      <div class="venues-grid">
        <div class="venue-card">
          <div class="venue-icon">
            <svg viewBox="0 0 48 48" width="40" height="40">
              <polygon points="24,4 8,24 14,24 14,42 34,42 34,24 40,24" fill="none" stroke="#4CAF50" stroke-width="1.5" stroke-linejoin="round"/>
              <rect x="20" y="30" width="8" height="12" fill="none" stroke="#D84315" stroke-width="1.2"/>
              <circle cx="24" cy="17" r="3" fill="none" stroke="#4CAF50" stroke-width="1.2"/>
            </svg>
          </div>
          <h3 class="venue-name">
            <span data-pl="Ceremonia Kościelna" data-en="Church Ceremony" class="lang-part"></span>
          </h3>
          <p class="venue-location">
            <span data-pl="Sanktuarium Macierzyństwa NMP" data-en="Sanktuarium Macierzyństwa NMP" class="lang-part"></span>
            <br />
            <span data-pl="w Dziekanowicach" data-en="in Dziekanowice" class="lang-part"></span>
          </p>
          <a href="https://www.google.com/maps/search/?api=1&query=Sanktuarium+Macierzy%C5%84stwa+NMP+Dziekanowice" target="_blank" rel="noopener noreferrer" class="venue-link">
            <span data-pl="Otwórz w Google Maps &#8599;" data-en="Open in Google Maps &#8599;" class="lang-part"></span>
          </a>
        </div>
        <div class="venue-card">
          <div class="venue-icon">
            <svg viewBox="0 0 48 48" width="40" height="40">
              <rect x="8" y="14" width="32" height="28" rx="2" fill="none" stroke="#4CAF50" stroke-width="1.5"/>
              <line x1="8" y1="22" x2="40" y2="22" stroke="#4CAF50" stroke-width="1"/>
              <circle cx="18" cy="30" r="4" fill="none" stroke="#4CAF50" stroke-width="1.5"/>
              <circle cx="30" cy="30" r="4" fill="none" stroke="#4CAF50" stroke-width="1.5"/>
              <line x1="22" y1="36" x2="26" y2="36" stroke="#D84315" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="24" y1="34" x2="24" y2="38" stroke="#D84315" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <h3 class="venue-name">
            <span data-pl="Przyjęcie Weselne" data-en="Wedding Reception" class="lang-part"></span>
          </h3>
          <p class="venue-location">
            <span data-pl="Folwark Zalesie" data-en="Folwark Zalesie" class="lang-part"></span>
          </p>
          <a href="https://www.google.com/maps/search/?api=1&query=Folwark+Zalesie" target="_blank" rel="noopener noreferrer" class="venue-link">
            <span data-pl="Otwórz w Google Maps &#8599;" data-en="Open in Google Maps &#8599;" class="lang-part"></span>
          </a>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== RSVP FORM SECTION ===== -->
  <section class="rsvp" id="rsvp">
    <div class="container rsvp-container">
      <h2 class="section-title">
        <span data-pl="Potwierdź Obecność" data-en="RSVP" class="lang-part"></span>
      </h2>
      <form class="rsvp-form" id="rsvpForm" novalidate>

        <!-- Field 1: Full Name -->
        <div class="form-group">
          <label for="fullName" data-pl="Imię i Nazwisko" data-en="Full Name" class="lang-part"></label>
          <input type="text" id="fullName" name="fullName" required autocomplete="name" />
          <span class="form-underline"></span>
        </div>

        <!-- Field 2: Attendance -->
        <fieldset class="form-group form-group-radio">
          <legend data-pl="Czy potwierdzasz obecność?" data-en="Will you attend?" class="lang-part"></legend>
          <div class="radio-options">
            <label class="radio-label">
              <input type="radio" name="attendance" value="accepts" required />
              <span class="radio-custom"></span>
              <span data-pl="Z radością przybędę" data-en="Joyfully Accepts" class="lang-part"></span>
            </label>
            <label class="radio-label">
              <input type="radio" name="attendance" value="declines" required />
              <span class="radio-custom"></span>
              <span data-pl="Z żalem odmawiam" data-en="Regretfully Declines" class="lang-part"></span>
            </label>
          </div>
        </fieldset>

        <!-- Field 3: Dietary Restrictions -->
        <div class="form-group">
          <label for="dietary" data-pl="Dieta i Alergie" data-en="Dietary Restrictions" class="lang-part"></label>
          <input type="text" id="dietary" name="dietary" autocomplete="off" />
          <span class="form-underline"></span>
        </div>

        <!-- Field 4: Song Request -->
        <div class="form-group form-group--optional">
          <label for="song" data-pl="Twoja piosenka na parkiet" data-en="Song Request" class="lang-part"></label>
          <input type="text" id="song" name="song" autocomplete="off" />
          <span class="form-underline"></span>
          <span class="optional-badge lang-part" data-pl="opcjonalne" data-en="optional"></span>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="submit-btn">
          <span data-pl="Potwierdź Obecność" data-en="Confirm Attendance" class="lang-part"></span>
        </button>
      </form>

      <!-- Success State -->
      <div class="success-state" id="successState" aria-hidden="true">
        <div class="success-icon">
          <svg viewBox="0 0 100 100" class="flower-svg">
            <line x1="50" y1="100" x2="50" y2="50" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
            <ellipse cx="50" cy="20" rx="10" ry="14" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>
            <ellipse cx="50" cy="20" rx="14" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>
            <ellipse cx="42" cy="14" rx="8" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5" transform="rotate(-30 42 14)"/>
            <ellipse cx="58" cy="14" rx="8" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5" transform="rotate(30 58 14)"/>
            <ellipse cx="58" cy="26" rx="8" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5" transform="rotate(60 58 26)"/>
            <ellipse cx="42" cy="26" rx="8" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5" transform="rotate(-60 42 26)"/>
            <circle cx="50" cy="20" r="5" fill="#D84315"/>
          </svg>
        </div>
        <p class="success-message">
          <span data-pl="Dziękujemy. Nie możemy się doczekać, aby świętować razem z Wami!" data-en="Thank you. We can't wait to celebrate with you!" class="lang-part"></span>
        </p>
      </div>
    </div>
  </section>

  <script src="scripts.js"></script>
</body>
</html>
